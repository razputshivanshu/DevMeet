version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: devmeet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: devmeet
      POSTGRES_PASSWORD: devmeet_password
      POSTGRES_DB: devmeet
    ports:
      - '5432:5432'
    volumes:
      - devmeet_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U devmeet -d devmeet']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devmeet-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 8001
      DATABASE_URL: postgresql://devmeet:devmeet_password@postgres:5432/devmeet?schema=public
      JWT_SECRET: change_me_in_prod
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:5173
      UPLOAD_DIR: /app/uploads
      GOOGLE_CLIENT_ID: ''
      GOOGLE_CLIENT_SECRET: ''
      GOOGLE_CALLBACK_URL: http://localhost:8001/api/auth/google/callback
    ports:
      - '8001:8001'
    volumes:
      - ./backend:/app
      - /app/node_modules
      - devmeet_uploads:/app/uploads
    command: sh -c "npx prisma migrate deploy && npx prisma db seed && yarn dev"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: devmeet-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8001
      VITE_SOCKET_URL: http://localhost:8001
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: yarn dev --host 0.0.0.0

volumes:
  devmeet_pgdata:
  devmeet_uploads:
